<!doctype html>
<html lang="en">

<head>

  <title>Game Project Page</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">RushyMC</a>
      <nav>
        <a href="index.html">Home</a>
        <a class="active" href="projects.html">Projects</a>
      </nav>
    </div>

  <main class="container projects-page">
    <section class="projects-intro">
      <p class="eyebrow">Projects</p>
      <h1>Game Portfolio</h1>

    <p>Here are some of my games.</p>
    <section id="projects-grid" class="projects-grid" aria-live="polite"></section>

  <script src="script.js"></script>
